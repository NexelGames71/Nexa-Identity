services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nexa_identity
      POSTGRES_PASSWORD: nexa_identity
      POSTGRES_DB: nexa_identity
    ports:
      - "5432:5432"
    volumes:
      - nexa_identity_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexa_identity -d nexa_identity"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  nexa_identity_postgres:
